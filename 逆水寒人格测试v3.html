<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>逆水寒NBTI人格测试</title>
<style>
:root{--bg:#e8f0ec;--text:#1a2e24;--muted:#5a7a68;--border:rgba(45,100,80,.15);--accent:#2d8a6e;--accent2:#1b6b52;--card:rgba(255,255,255,.72);--card2:rgba(245,250,247,.88);--shadow:0 12px 40px rgba(20,60,45,.1);--glow:0 0 20px rgba(45,138,110,.15)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;font-size:15px}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(160deg,#e8f0ec,#d4e5db,#e8f0ec);z-index:-2}
.shell{max-width:780px;margin:0 auto;padding:20px 16px 56px}
.page{display:none}.page.active{display:block}
.card,.hero,.panel,.result-card{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:24px}
.hero{min-height:calc(100vh - 80px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:48px 28px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(45,138,110,.08),transparent 60%);pointer-events:none}
.hero-emoji{font-size:80px;margin-bottom:16px;filter:drop-shadow(0 8px 20px rgba(45,138,110,.2));animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.06) translateY(-4px)}}
.hero h1{font-size:clamp(28px,6vw,46px);font-weight:900;letter-spacing:2px;margin-bottom:12px;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .sub{color:var(--muted);font-size:14px;line-height:2;max-width:520px;margin-bottom:32px}
.btn{border:none;border-radius:16px;cursor:pointer;padding:15px 40px;font-weight:700;font-size:16px;font-family:inherit;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 20px rgba(45,138,110,.25);transition:.25s transform,.25s box-shadow;letter-spacing:1px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(45,138,110,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--border);box-shadow:none}
.btn-outline:hover{background:rgba(45,138,110,.06)}
.test-wrap{padding:0;margin-top:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:20px;position:sticky;top:0;background:rgba(232,240,236,.92);backdrop-filter:blur(12px);padding:14px 0;z-index:50;flex-wrap:wrap}
.topbar h2{font-size:clamp(18px,4vw,24px);font-weight:800;letter-spacing:1px}
.progress{flex:1;min-width:180px;height:8px;background:rgba(45,138,110,.1);border-radius:99px;overflow:hidden}
.progress>span{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:inherit;transition:.3s width}
.progress-text{color:var(--muted);font-size:13px;white-space:nowrap}
.question-list{display:grid;gap:18px}
.question{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:0 4px 16px rgba(20,60,45,.06);transition:.3s border-color}
.question.answered{border-color:var(--accent)}
.question-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;color:var(--muted);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:5px 12px;background:rgba(45,138,110,.08);border:1px solid rgba(45,138,110,.12);font-weight:700;font-size:12px;color:var(--accent2)}
.question-title{font-size:15px;line-height:1.9;white-space:pre-wrap;margin-bottom:4px}
.options{display:grid;gap:10px;margin-top:14px}
.option{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:16px;border:1px solid var(--border);background:var(--card2);cursor:pointer;transition:.2s border-color,.2s background,.15s transform;line-height:1.7}
.option:hover{border-color:rgba(45,138,110,.3);background:rgba(45,138,110,.04)}
.option.selected{border-color:var(--accent);background:rgba(45,138,110,.1);animation:optPop .25s ease}
.option-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:.2s}
.option.selected .option-check{border-color:var(--accent);background:var(--accent)}
.option.selected .option-check::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.option-label{font-weight:800;color:var(--accent);min-width:18px}
.option-text{font-size:14px}
@keyframes optPop{0%{transform:scale(1)}40%{transform:scale(1.015)}100%{transform:scale(1)}}
.actions-bottom{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:24px}
.trigger-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;justify-content:center;align-items:center}
.trigger-overlay.show{display:flex}
.trigger-content{text-align:center;padding:40px}
.trigger-emoji{font-size:80px;margin-bottom:16px}
.trigger-text{font-size:20px;color:#a3d9c0;font-weight:800;margin-bottom:10px}
.trigger-sub{font-size:14px;color:#8ab;margin-bottom:28px;line-height:1.8}
.trigger-btn{background:var(--accent);color:#fff;border:none;padding:13px 32px;border-radius:16px;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit}
.result-wrap{padding:0;margin-top:20px}
.result-layout{display:grid;gap:20px}
.result-top{text-align:center;padding:32px 24px}
.result-emoji-wrap{width:150px;height:150px;margin:0 auto 20px;border-radius:50%;background:radial-gradient(circle,rgba(45,138,110,.12),rgba(45,138,110,.03));display:flex;align-items:center;justify-content:center;animation:emojiGlow 3s ease-in-out infinite}
.result-emoji{font-size:80px;display:block;filter:drop-shadow(0 6px 20px rgba(45,138,110,.25));animation:breathe 3s ease-in-out infinite}
@keyframes emojiGlow{0%,100%{box-shadow:0 0 30px rgba(45,138,110,.08),0 0 60px rgba(45,138,110,.04)}50%{box-shadow:0 0 40px rgba(45,138,110,.15),0 0 80px rgba(45,138,110,.08)}}
.type-code{font-size:14px;color:var(--accent);letter-spacing:.15em;margin-bottom:6px;font-weight:700}
.type-name{font-size:clamp(26px,5vw,42px);font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.type-tag{margin-top:10px;color:var(--accent2);font-size:15px;font-weight:700}
.match-badge{margin-top:16px;display:inline-flex;align-items:center;gap:8px;border-radius:99px;padding:10px 18px;background:rgba(45,138,110,.08);border:1px solid rgba(45,138,110,.12);color:var(--accent2);font-weight:700;font-size:14px}
.social-tags{margin-top:16px;padding:14px 18px;border-radius:14px;background:rgba(45,138,110,.05);border-left:4px solid var(--accent);font-size:14px;line-height:1.9;text-align:left;display:inline-block}
.social-tags strong{color:var(--accent2);display:block;margin-bottom:4px}
.section-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:0 4px 16px rgba(20,60,45,.06)}
.section-box h3{font-size:16px;margin-bottom:14px;color:var(--accent2);font-weight:800}
.section-box .desc{font-size:14px;line-height:2;white-space:pre-wrap;color:var(--text)}
.advice-box{margin-top:16px;padding:16px;border-radius:14px;background:rgba(45,138,110,.06);border:1px solid rgba(45,138,110,.12)}
.advice-box strong{color:var(--accent2);display:block;margin-bottom:6px}
.advice-box p{color:var(--muted);font-size:14px;line-height:1.9}
.dim-list{display:grid;gap:12px}
.dim-item{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.dim-item-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px}
.dim-item-name{font-size:14px;font-weight:700}
.dim-item-score{color:var(--accent2);font-weight:800;font-size:14px}
.dim-bar{height:6px;background:rgba(45,138,110,.1);border-radius:99px;overflow:hidden}
.dim-bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:inherit;transition:.5s width}
.dim-item-desc{font-size:12px;color:var(--muted);margin-top:6px}
.result-actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:24px}
.footer-note{margin-top:24px;color:var(--muted);font-size:12px;line-height:1.9;text-align:center}
@media(max-width:600px){.shell{padding:12px 10px 40px}.hero{padding:32px 20px}.question,.section-box{padding:16px}}

/* 保存为图片 - 结果卡片 */
#captureCard{position:absolute;left:-9999px;top:0;width:420px;background:#f0f6f2;border-radius:0;padding:32px 28px;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;color:#1a2e24}
#captureCard .cap-emoji{font-size:64px;text-align:center;margin-bottom:12px}
#captureCard .cap-code{text-align:center;font-size:13px;color:#2d8a6e;letter-spacing:.15em;font-weight:700;margin-bottom:4px}
#captureCard .cap-name{text-align:center;font-size:28px;font-weight:900;margin-bottom:6px}
#captureCard .cap-tag{text-align:center;font-size:14px;color:#2d8a6e;font-weight:700;margin-bottom:6px}
#captureCard .cap-match{text-align:center;font-size:13px;color:#5a7a68;margin-bottom:16px}
#captureCard .cap-desc{font-size:12px;line-height:1.9;color:#304034;white-space:pre-wrap;margin-bottom:16px;border-top:1px solid rgba(45,100,80,.15);padding-top:14px}
#captureCard .cap-advice{font-size:12px;line-height:1.8;color:#5a7a68;padding:12px;background:rgba(45,138,110,.06);border-radius:10px;border:1px solid rgba(45,138,110,.1);margin-bottom:20px}
#captureCard .cap-advice strong{color:#2d8a6e;display:block;margin-bottom:4px}
#captureCard .cap-footer{display:flex;justify-content:space-between;align-items:flex-end;padding-top:14px;border-top:1px solid rgba(45,100,80,.12)}
#captureCard .cap-qr{width:80px;height:80px;border:2px dashed rgba(45,100,80,.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#5a7a68;text-align:center;line-height:1.4;flex-shrink:0}
#captureCard .cap-branding{text-align:right;font-size:11px;color:#5a7a68;line-height:1.6}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="shell">
<section id="intro" class="page active">
  <div class="hero">
    <div class="hero-emoji">⚔️</div>
    <h1>逆水寒NBTI人格测试</h1>
    <p class="sub">什么MBTI？什么九型人格？<br>来测测你在逆水寒里到底是什么类型的玩家。<br>29道灵魂拷问，揭穿你的大宋真面目。</p>
    <p style="margin-top:8px;color:var(--muted);font-size:12px;line-height:1.8">创意来源于玩家投稿，与游戏实际玩法无关，仅供娱乐。</p>
    <button class="btn" onclick="startTest()">开始测试</button>
    <p style="margin-top:18px;color:var(--muted);font-size:12px">耗时约 3 分钟 · 测完可以直接去对线</p>
  </div>
</section>
<section id="test" class="page">
  <div class="test-wrap">
    <div class="topbar">
      <h2>⚔️ 逆水寒江湖鉴定</h2>
      <span class="progress-text" id="counterText">0 / 29</span>
    </div>
    <div class="progress" style="margin-bottom:20px"><span id="progressBar"></span></div>
    <div class="question-list" id="questionList"></div>
    <div class="actions-bottom">
      <button class="btn" id="submitBtn" disabled onclick="submitTest()">生成鉴定报告</button>
    </div>
    <p id="submitHint" style="text-align:center;color:var(--muted);font-size:13px;margin-top:10px">请回答全部29道题</p>
  </div>
</section>
<section id="result" class="page">
  <div class="result-wrap">
    <div class="result-layout">
      <div class="result-card result-top" id="resultTop"></div>
      <div class="section-box" id="resultDesc"></div>
      <div class="section-box" id="resultDims"></div>
      <div class="result-actions">
        <button class="btn" onclick="saveAsImage()">保存结果图片</button>
        <button class="btn btn-outline" onclick="restart()">不服，再测一次</button>
      </div>
      <p class="footer-note">本测试纯属娱乐，平等地攻击每一位逆水寒玩家。<br>与网易·逆水寒官方无关，不代表任何官方观点。<br>如有被冒犯，说明测得极准。</p>
    </div>
  </div>
</section>
</div>
<div id="captureCard"></div>
<div class="trigger-overlay" id="triggerOverlay">
  <div class="trigger-content">
    <div class="trigger-emoji">💤</div>
    <div class="trigger-text">系统判定异常</div>
    <div class="trigger-sub">检测到您的高频挂机行为<br>您的测试结果已被强制覆盖为：AFK! 挂机侠</div>
    <button class="trigger-btn" onclick="acceptTrigger()">我认罪</button>
  </div>
</div>
<script>

const questions = [
  {
    "dim": "J1",
    "text": "你在逆水寒里最期待的版本更新是什么？",
    "opts": [
      {
        "t": "当然是新外观！新宠物！这么帅！那么美~",
        "v": 1
      },
      {
        "t": "都行，有新内容就好",
        "v": 2
      },
      {
        "t": "新副本、33等战斗玩法，我要跟上大部队的节奏！",
        "v": 3
      }
    ]
  },
  {
    "dim": "J1",
    "text": "你在野外安静地挖矿，突然一个红名玩家朝你走来，距离还有十秒。你的手：",
    "opts": [
      {
        "t": "“你不要过来呀！”马上走开~",
        "v": 1
      },
      {
        "t": "咋滴？想抢矿？一键连招！（加速挖矿）",
        "v": 2
      },
      {
        "t": "先打一顿再报官",
        "v": 3
      }
    ]
  },
  {
    "dim": "J2",
    "text": "你们只看到我每天在逆水寒里挂机发呆、聊天摸鱼、做一半日课就下线刷抖音的样子，却从没看到我认真研究攻略、凌晨三点搓木桩的样子。你们看不到，因为我确实没干过。那么——你今天的日课做完了吗？",
    "opts": [
      {
        "t": "日课？不给羽毛我做它干啥",
        "v": 1
      },
      {
        "t": "挑了几个简单的做",
        "v": 2
      },
      {
        "t": "必须做完！还得满勤，我就是来逆水寒上班的",
        "v": 3
      }
    ]
  },
  {
    "dim": "J2",
    "text": "服务器临时维护4小时。你的精神状态更接近：",
    "opts": [
      {
        "t": "太好了，终于有正当理由不上线了",
        "v": 1
      },
      {
        "t": "刷刷社区看看大家在讨论啥，顺便摸个鱼",
        "v": 2
      },
      {
        "t": "逆瘾发作，速速开门！",
        "v": 3
      }
    ]
  },
  {
    "dim": "J3",
    "text": "组队打副本灭团了。语音里沉默了三秒后，你开口的第一句话是：",
    "opts": [
      {
        "t": "我是高手，不开麦",
        "v": 1
      },
      {
        "t": "“刚刚谁没走机制出来认领一下好吗好的”",
        "v": 2
      },
      {
        "t": "“反正我操作拉满了，不关我的事”",
        "v": 3
      }
    ]
  },
  {
    "dim": "J3",
    "text": "逆水寒玩家打本扣分行为自查，看看你中了几条：1.不管什么场景，统统一键连招 2.走位撞墙卡视角 3.大招交给空气 4.吃掉8次化羽 5.不走机制 6.秒拉秒死",
    "opts": [
      {
        "t": "师傅别念了，都是我！",
        "v": 1
      },
      {
        "t": "中了两三条，正常失误，谁还没个翻车的时候",
        "v": 2
      },
      {
        "t": "这是我队友的症状清单。我负责截图发群嘲笑他们",
        "v": 3
      }
    ]
  },
  {
    "dim": "S1",
    "text": "世界频道有人发喇叭：“滴个情缘，要求衣柜大、声音好听、每天陪玩4小时以上。”你的反应：",
    "opts": [
      {
        "t": "自动忽略",
        "v": 1
      },
      {
        "t": "不知道，没看清，反正+1+1+1+1+1+1",
        "v": 2
      },
      {
        "t": "点进资料并打招呼私聊",
        "v": 3
      }
    ]
  },
  {
    "dim": "S1",
    "text": "每次路过汴京虹桥，你最真实的常态是：",
    "opts": [
      {
        "t": "“好多人啊.jpg”，赶紧溜走",
        "v": 1
      },
      {
        "t": "镜头拉到最近欣赏自己新染的头发",
        "v": 2
      },
      {
        "t": "找个最完美的位置展示穿搭，顺便看隔壁模特们齐舞",
        "v": 3
      }
    ]
  },
  {
    "dim": "S2",
    "text": "帮会最近连续两周联赛连跪，统战在群里叹气。",
    "opts": [
      {
        "t": "光速退帮跳槽",
        "v": 1
      },
      {
        "t": "不走！说什么都不走！但也不打帮战嘻嘻",
        "v": 2
      },
      {
        "t": "发攻略帮助大家提战，还会去世界频道招人",
        "v": 3
      }
    ]
  },
  {
    "dim": "S2",
    "text": "突然某一天，你意识到自己在帮会里投入了太多太多。每天组织帮战、调解矛盾、带新人、凑帮会资金，大当家跑了你接盘，二当家摸鱼你兜底。你不是在玩游戏，你是在当义务居委会主任。但有时候你也会想——我图什么呢？其实大家长期在帮会这种高压环境下情绪有点问题很正常哒～一定要学会自我调节，要相信一切都会啊啊啊啊啊啊啊啊啊！哈哈哈哈！好起来的哒～加油！",
    "opts": [
      {
        "t": "所以我早就不这样了。人间清醒，该走就走",
        "v": 1
      },
      {
        "t": "……这是在干什么？",
        "v": 2
      },
      {
        "t": "这就是我啊。帮会就是我的家",
        "v": 3
      }
    ]
  },
  {
    "dim": "S3",
    "text": "萌新好友私聊你：“大佬能借我288买衣服吗，下周还你。”你心里清楚——上周那个借288的人已经退游了。",
    "opts": [
      {
        "t": "“你看我像不像288”",
        "v": 1
      },
      {
        "t": "我直接送你，但是要到6月周年庆才会到账，到时候记得上号领",
        "v": 2
      },
      {
        "t": "288而已，直接转了",
        "v": 3
      }
    ]
  },
  {
    "dim": "S3",
    "text": "别人说你“人真好”，你内心更接近哪句？",
    "opts": [
      {
        "t": "我只是在做对我有利的事而已",
        "v": 1
      },
      {
        "t": "也许吧",
        "v": 2
      },
      {
        "t": "被需要的感觉确实让我开心",
        "v": 3
      }
    ]
  },

  "E1": {
    "name": "暴怒指数",
    "L": "佛系微笑",
    "M": "忍而不发",
    "H": "一点就炸"
  },
  "E2": {
    "name": "门派忠诚",
    "L": "墙头草",
    "M": "随遇而安",
    "H": "至死不渝"
  },
  "E3": {
    "name": "情感羁绊",
    "L": "洒脱",
    "M": "无情换乘",
    "H": "纯爱战神"
  },
  "I1": {
    "name": "角色代入",
    "L": "工具人",
    "M": "有点感情",
    "H": "灵魂羁绊"
  },
  "I2": {
    "name": "剧情沉浸",
    "L": "跳过侠",
    "M": "选择性观看",
    "H": "沉浸式观影"
  },
  "I3": {
    "name": "消费冲动",
    "L": "零氪铁公鸡",
    "M": "微氪理财",
    "H": "移动提款机"
  }
};
const dimOrder = ["J1","J2","J3","S1","S2","S3","A1","A2","A3","E1","E2","E3","I1","I2","I3"];
const dimQuestions = {
  J1:[0,1], J2:[2,3,28], J3:[4,5],
  S1:[6,7], S2:[8,9], S3:[10,11],
  A1:[12,13], A2:[14,15], A3:[16,17],
  E1:[18,19], E2:[20], E3:[21,22],
  I1:[23,24,25], I2:[26], I3:[27]
};

let answers = {};
let afkTriggered = false;

function startTest() {
  document.getElementById('intro').classList.remove('active');
  document.getElementById('test').classList.add('active');
  renderQuestions();
  window.scrollTo({top:0,behavior:'smooth'});
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderQuestions() {
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  const labels = ['A','B','C'];
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question';
    card.id = 'q' + qi;
    const longClass = '';
    let optsHtml = '';
    q.opts.forEach((o, oi) => {
      optsHtml += '<div class="option" data-qi="'+qi+'" data-v="'+o.v+'" onclick="pickOption(this)">' +
        '<span class="option-check"></span>' +
        '<span class="option-label">'+labels[oi]+'</span>' +
        '<span class="option-text">'+escHtml(o.t)+'</span></div>';
    });
    card.innerHTML =
      '<div class="question-meta"><span class="badge">Q'+(qi+1)+'</span><span>\u5927\u5b8b\u673a\u5bc6\u6863\u6848</span></div>' +
      '<div class="question-title'+longClass+\">'+escHtml(q.text)+'</div>' +
      '<div class="options">'+optsHtml+'</div>';
    list.appendChild(card);
  });
  updateProgress();
}

function pickOption(el) {
  const qi = parseInt(el.dataset.qi);
  const v = parseInt(el.dataset.v);
  answers[qi] = v;
  const card = document.getElementById('q'+qi);
  card.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  card.classList.add('answered');
  updateProgress();
}

function updateProgress() {
  const n = Object.keys(answers).length;
  const total = questions.length;
  document.getElementById('counterText').textContent = n + ' / ' + total;
  document.getElementById('progressBar').style.width = (n/total*100)+'%';
  const btn = document.getElementById('submitBtn');
  const hint = document.getElementById('submitHint');
  if (n === total) {
    btn.disabled = false;
    hint.textContent = '\u5168\u90e8\u7b54\u5b8c\uff0c\u70b9\u51fb\u751f\u6210\u62a5\u544a\uff01';
  } else {
    btn.disabled = true;
    hint.textContent = '\u8fd8\u5269 '+(total-n)+' \u9898\u672a\u7b54';
  }
}

function submitTest() {
  if (answers[28] === 1) {
    afkTriggered = true;
    document.getElementById('triggerOverlay').classList.add('show');
    return;
  }
  showResult();
}

function acceptTrigger() {
  document.getElementById('triggerOverlay').classList.remove('show');
  showResult();
}

function calcDimScores() {
  const scores = {};
  dimOrder.forEach(dim => {
    const qis = dimQuestions[dim];
    let sum = 0;
    qis.forEach(qi => { sum += (answers[qi] || 2); });
    scores[dim] = Math.round(sum / qis.length * 10) / 10;
  });
  return scores;
}

function matchPersonality(scores) {
  if (afkTriggered) {
    return personalities.find(p => p.code === 'AFK!');
  }
  const userVec = dimOrder.map(d => scores[d]);
  let bestIdx = 0;
  let bestDist = Infinity;
  personalities.forEach((p, i) => {
    let dist = 0;
    for (let j = 0; j < 15; j++) {
      dist += Math.pow(userVec[j] - p.pattern[j], 2);
    }
    dist = Math.sqrt(dist);
    if (dist < bestDist) {
      bestDist = dist;
      bestIdx = i;
    }
  });
  return { ...personalities[bestIdx], distance: bestDist };
}

let _lastMatched = null, _lastMatchPct = 0;
function showResult() {
  const scores = calcDimScores();
  const matched = matchPersonality(scores);
  const maxDist = Math.sqrt(15 * 4);
  const matchPct = Math.max(0, Math.round((1 - (matched.distance || 0) / maxDist) * 100));
  _lastMatched = matched; _lastMatchPct = matchPct;

  const topEl = document.getElementById('resultTop');
  topEl.innerHTML =
    '<div class="result-emoji-wrap"><span class="result-emoji">'+matched.emoji+'</span></div>' +
    '<div class="type-code">'+matched.code+'</div>' +
    '<div class="type-name">'+escHtml(matched.name)+'</div>' +
    '<div class="type-tag">' + (afkTriggered ? '\ud83d\udea8 \u9690\u85cf\u4eba\u683c\u89e6\u53d1\uff01' : '\u2705 \u786e\u8bca\uff1a'+escHtml(matched.tag)) + '</div>' +
    (matched.distance !== undefined ? '<div class="match-badge">\ud83c\udfaf \u5339\u914d\u5ea6 '+matchPct+'%</div>' : '') +
    '';

  const descEl = document.getElementById('resultDesc');
  descEl.innerHTML =
    '<h3>\ud83d\udccb \u4eba\u683c\u6df1\u5ea6\u89e3\u8bfb</h3>' +
    '<div class="desc">'+escHtml(matched.desc)+'</div>' +
    '<div class="advice-box">' +
      '<strong>\ud83c\udfe5 \u5927\u5b8b\u751f\u5b58\u5efa\u8bae</strong>' +
      '<p>'+escHtml(matched.advice)+'</p>' +
    '</div>';

  const dimsEl = document.getElementById('resultDims');
  let dimsHtml = '<h3>\ud83d\udcca \u5341\u4e94\u7ef4\u5ea6\u5f97\u5206</h3><div class="dim-list">';
  dimOrder.forEach(dim => {
    const s = scores[dim];
    const pct = ((s - 1) / 2 * 100).toFixed(0);
    const meta = dimMeta[dim];
    let level = 'L';
    if (s >= 2.3) level = 'H';
    else if (s >= 1.7) level = 'M';
    dimsHtml +=
      '<div class="dim-item">' +
        '<div class="dim-item-top">' +
          '<span class="dim-item-name">'+dim+' '+meta.name+'</span>' +
          '<span class="dim-item-score">'+s.toFixed(1)+'</span>' +
        '</div>' +
        '<div class="dim-bar"><span style="width:'+pct+'%"></span></div>' +
        '<div class="dim-item-desc">'+meta[level]+'</div>' +
      '</div>';
  });
  dimsHtml += '</div>';
  dimsEl.innerHTML = dimsHtml;

  document.getElementById('test').classList.remove('active');
  document.getElementById('result').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart() {
  answers = {};
  afkTriggered = false;
  document.getElementById('result').classList.remove('active');
  document.getElementById('intro').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function saveAsImage() {
  const m = _lastMatched;
  if (!m) return;
  const card = document.getElementById('captureCard');
  const tagLine = afkTriggered ? '\ud83d\udea8 \u9690\u85cf\u4eba\u683c\u89e6\u53d1\uff01' : '\u2705 \u786e\u8bca\uff1a' + m.tag;
  const matchLine = afkTriggered ? '\u5339\u914d\u5ea6 100% \u00b7 \u4f60\u4eb2\u53e3\u627f\u8ba4\u7684' : '\ud83c\udfaf \u5339\u914d\u5ea6 ' + _lastMatchPct + '%';
  card.innerHTML =
    '<div class="cap-emoji">' + m.emoji + '</div>' +
    '<div class="cap-code">' + m.code + '</div>' +
    '<div class="cap-name">' + m.name + '</div>' +
    '<div class="cap-tag">' + tagLine + '</div>' +
    '<div class="cap-match">' + matchLine + '</div>' +
    '<div class="cap-desc">' + escHtml(m.desc) + '</div>' +
    '<div class="cap-advice"><strong>\ud83c\udfe5 \u5927\u5b8b\u751f\u5b58\u5efa\u8bae</strong>' + escHtml(m.advice) + '</div>' +
    '<div class="cap-footer">' +
      '<div class="cap-qr">\u626b\u7801\u53c2\u4e0e\u6d4b\u8bd5</div>' +
      '<div class="cap-branding">\u9006\u6c34\u5bd2NBTI\u4eba\u683c\u6d4b\u8bd5<br>\u521b\u610f\u6765\u6e90\u4e8e\u73a9\u5bb6\u6295\u7a3f\uff0c\u4ec5\u4f9b\u5a31\u4e50</div>' +
    '</div>';
  card.style.position = 'fixed';
  card.style.left = '0';
  card.style.top = '0';
  card.style.zIndex = '9999';
  html2canvas(card, {scale: 2, useCORS: true, backgroundColor: '#f0f6f2'}).then(function(canvas) {
    card.style.position = 'absolute';
    card.style.left = '-9999px';
    card.style.zIndex = '';
    const link = document.createElement('a');
    link.download = '\u6211\u7684\u9006\u6c34\u5bd2NBTI\u4eba\u683c_' + m.code + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(function() {
    card.style.position = 'absolute';
    card.style.left = '-9999px';
    alert('\u56fe\u7247\u751f\u6210\u5931\u8d25\uff0c\u8bf7\u622a\u56fe\u4fdd\u5b58');
  });
}
</script>
