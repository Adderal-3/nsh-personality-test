<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逆水寒SBTI人格测试</title>
<style>
:root{--bg:#0a0a0f;--panel:#141420;--text:#e8e4dc;--muted:#8a8578;--line:rgba(201,168,76,.15);--soft:rgba(201,168,76,.06);--accent:#c9a84c;--accent2:#e8d48b;--shadow:0 16px 40px rgba(0,0,0,.4);--radius:22px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.shell{max-width:860px;margin:0 auto;padding:20px 16px 56px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

/* screens */
.screen{display:none}.screen.active{display:block}

/* hero */
.hero{min-height:90vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:48px 24px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-80px;top:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.12),transparent 70%);pointer-events:none}
.hero-emoji{font-size:72px;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(201,168,76,.3))}
.hero h1{font-size:clamp(30px,6vw,50px);font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px}
.hero .sub{color:var(--muted);font-size:14px;line-height:1.9;max-width:560px;margin-bottom:32px}
button{border:0;cursor:pointer;font:inherit;transition:.2s transform,.2s box-shadow}
button:hover{transform:translateY(-2px)}
button:disabled{cursor:not-allowed;opacity:.45;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),#a88a30);color:#0a0a0f;padding:15px 28px;border-radius:14px;font-weight:800;font-size:16px;box-shadow:0 8px 24px rgba(201,168,76,.25)}
.btn-secondary{background:transparent;color:var(--accent);padding:14px 24px;border-radius:14px;border:1px solid var(--line);font-weight:700}

/* test */
.test-wrap{padding:24px;margin-top:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.progress{flex:1;min-width:200px;height:8px;background:rgba(201,168,76,.1);border-radius:99px;overflow:hidden}
.progress>span{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:inherit;transition:.25s width}
.progress-text{color:var(--muted);font-size:13px;white-space:nowrap}
.question-list{display:grid;gap:18px}
.question{border:1px solid var(--line);border-radius:18px;padding:20px;background:rgba(255,255,255,.02)}
.question-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:var(--muted);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:5px 10px;background:var(--soft);border:1px solid var(--line);font-weight:700}
.question-title{font-size:15px;line-height:1.85;white-space:pre-wrap;margin-bottom:2px}
.question-title.long{max-height:4.8em;overflow:hidden;position:relative;cursor:pointer}
.question-title.long::after{content:'点击展开全文 ▾';position:absolute;bottom:0;left:0;right:0;height:2.4em;background:linear-gradient(transparent,var(--panel) 70%);display:flex;align-items:flex-end;justify-content:center;font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px}
.question-title.long.expanded{max-height:none}
.question-title.long.expanded::after{display:none}
.options{display:grid;gap:10px;margin-top:14px}
.option{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.02);cursor:pointer;transition:.2s border-color,.2s background,.15s transform}
.option:hover{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.04)}
.option.selected{border-color:var(--accent);background:rgba(201,168,76,.08);animation:optPop .25s ease}
.option input{display:none}
.option-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:.2s border-color,.2s background}
.option.selected .option-check{border-color:var(--accent);background:var(--accent)}
.option.selected .option-check::after{content:'';width:8px;height:8px;border-radius:50%;background:#0a0a0f}
.option-code{font-weight:800;color:var(--accent);min-width:20px}
@keyframes optPop{0%{transform:scale(1)}40%{transform:scale(1.02)}100%{transform:scale(1)}}
.actions-bottom{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:22px}
.hint{color:var(--muted);font-size:13px;line-height:1.7}

/* result */
.result-wrap{padding:28px 24px;margin-top:20px}
.result-layout{display:grid;gap:20px}
.result-top{text-align:center;padding:24px 0}
.result-emoji-wrap{width:140px;height:140px;margin:0 auto 20px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.12),rgba(201,168,76,.03));display:flex;align-items:center;justify-content:center;animation:emojiGlow 3s ease-in-out infinite}
.result-emoji{font-size:72px;display:block;filter:drop-shadow(0 6px 20px rgba(201,168,76,.3));animation:emojiFloat 3s ease-in-out infinite}
@keyframes emojiGlow{0%,100%{box-shadow:0 0 30px rgba(201,168,76,.08),0 0 60px rgba(201,168,76,.04)}50%{box-shadow:0 0 40px rgba(201,168,76,.15),0 0 80px rgba(201,168,76,.08)}}
@keyframes emojiFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.type-kicker{font-size:12px;color:var(--accent);letter-spacing:.06em;margin-bottom:8px;font-weight:700}
.type-name{font-size:clamp(28px,5vw,44px);font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.type-subname{margin-top:10px;color:var(--accent);font-size:15px;font-weight:700}
.match-badge{margin-top:16px;display:inline-flex;align-items:center;gap:8px;border-radius:99px;padding:10px 16px;background:var(--soft);border:1px solid var(--line);color:var(--accent);font-weight:700;font-size:14px}
.analysis-box,.dim-box,.note-box{border:1px solid var(--line);border-radius:18px;padding:20px;background:rgba(255,255,255,.02)}
.analysis-box h3,.dim-box h3,.note-box h3{font-size:16px;margin-bottom:14px;color:var(--accent2)}
.analysis-box p{color:var(--text);font-size:15px;line-height:2;white-space:pre-wrap}
.advice-box{margin-top:16px;padding:16px;border-radius:14px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12)}
.advice-box strong{color:var(--accent);display:block;margin-bottom:6px}
.advice-box p{color:var(--muted);font-size:14px;line-height:1.8}
.dim-list{display:grid;gap:12px}
.dim-item{border:1px solid var(--line);border-radius:14px;padding:14px;background:rgba(255,255,255,.015)}
.dim-item-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px}
.dim-item-name{font-size:14px;font-weight:700}
.dim-item-score{color:var(--accent);font-weight:800;font-size:14px}
.note-box p{color:var(--muted);font-size:13px;line-height:1.8}
.result-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:24px}
.footer-note{margin-top:20px;color:var(--muted);font-size:12px;line-height:1.7;text-align:center}

@media(max-width:600px){
  .shell{padding:12px 10px 40px}
  .hero,.test-wrap,.result-wrap{padding:18px 14px}
  .hero h1{font-size:30px}
  .question-title{font-size:14px}
}
</style>
</head>
<body>
<div class="shell">
  <section id="intro" class="screen active">
    <div class="hero card">
      <div class="hero-emoji">⚔️</div>
      <h1>逆水寒SBTI人格测试</h1>
      <p class="sub">什么MBTI？来测测你是什么类型的逆水寒玩家。<br>29道题，测出你的江湖真面目。</p>
      <button id="startBtn" class="btn-primary">开始测试</button>
      <p style="margin-top:24px;color:var(--muted);font-size:12px;">仅供娱乐，与网易逆水寒官方无关</p>
    </div>
  </section>

  <section id="test" class="screen">
    <div class="test-wrap card">
      <div class="topbar">
        <div class="progress"><span id="progressBar"></span></div>
        <div class="progress-text" id="progressText">0 / 29</div>
      </div>
      <div id="questionList" class="question-list"></div>
      <div class="actions-bottom">
        <div class="hint" id="testHint">答完所有题才能提交。少侠，认真点。</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button id="backIntroBtn" class="btn-secondary">返回首页</button>
          <button id="submitBtn" class="btn-primary" disabled>提交并查看结果</button>
        </div>
      </div>
    </div>
  </section>

  <section id="result" class="screen">
    <div class="result-wrap card">
      <div class="result-layout">
        <div class="result-top">
          <div class="result-emoji-wrap"><span class="result-emoji" id="resultEmoji"></span></div>
          <div class="type-kicker" id="resultKicker">你的江湖人格</div>
          <div class="type-name" id="resultTypeName"></div>
          <div class="type-subname" id="resultConfirm"></div>
          <div class="match-badge" id="matchBadge"></div>
        </div>
        <div class="analysis-box">
          <h3>确诊报告</h3>
          <p id="resultDesc"></p>
        </div>
        <div class="advice-box" id="adviceBox">
          <strong id="adviceTitle"></strong>
          <p id="adviceText"></p>
        </div>
        <div class="dim-box">
          <h3>十五维度评分</h3>
          <div id="dimList" class="dim-list"></div>
        </div>
        <div class="note-box">
          <h3>免责声明</h3>
          <p>本测试仅供娱乐，与网易逆水寒官方无关。别拿它当诊断、面试、相亲、分手或人生判决书。你可以笑，但别太当真。</p>
        </div>
      </div>
      <div class="result-actions">
        <button id="restartBtn" class="btn-secondary">重新测试</button>
        <button id="toTopBtn" class="btn-primary">回到首页</button>
      </div>
    </div>
  </section>
</div>

<script>
const dimMeta={
  J1:{name:'J1 战斗信仰',model:'江湖修为'},J2:{name:'J2 肝度',model:'江湖修为'},J3:{name:'J3 操作自信',model:'江湖修为'},
  S1:{name:'S1 社交主动性',model:'社交门道'},S2:{name:'S2 帮会忠诚',model:'社交门道'},S3:{name:'S3 交易心态',model:'社交门道'},
  A1:{name:'A1 外观执念',model:'审美执念'},A2:{name:'A2 家园执念',model:'审美执念'},A3:{name:'A3 截图欲',model:'审美执念'},
  E1:{name:'E1 抗挫折力',model:'情绪波动'},E2:{name:'E2 版本信仰',model:'情绪波动'},E3:{name:'E3 退游指数',model:'情绪波动'},
  I1:{name:'I1 角色代入感',model:'身份认同'},I2:{name:'I2 剧情态度',model:'身份认同'},I3:{name:'I3 氪金态度',model:'身份认同'}
};
const dimOrder=['J1','J2','J3','S1','S2','S3','A1','A2','A3','E1','E2','E3','I1','I2','I3'];
const dimQuestions={J1:['q1','q2'],J2:['q3','q4','q29'],J3:['q5','q6'],S1:['q7','q8'],S2:['q9','q10'],S3:['q11','q12'],A1:['q13','q14'],A2:['q15','q16'],A3:['q17','q18'],E1:['q19','q20'],E2:['q21'],E3:['q22','q23'],I1:['q24','q25','q26'],I2:['q27'],I3:['q28']};

const questions=[
{id:'q1',dim:'J1',text:'你在逆水寒里最期待的版本更新是什么？',options:[{label:'当然是新外观！新宠物！这么帅！那么美~',value:1},{label:'都行，有新内容就好',value:2},{label:'新副本、33等战斗玩法，我要跟上大部队的节奏！',value:3}]},
{id:'q2',dim:'J1',text:'你在野外安静地挖矿，突然一个红名玩家朝你走来，距离还有十秒。你的手：',options:[{label:'"你不要过来呀！"马上走开~',value:1},{label:'咋滴？想抢矿？一键连招！（加速挖矿）',value:2},{label:'先打一顿再报官',value:3}]},
{id:'q3',dim:'J2',text:'你们只看到我每天在逆水寒里挂机发呆、聊天摸鱼、做一半日课就下线刷抖音的样子，却从没看到我认真研究攻略、凌晨三点搓木桩的样子。你们看不到，因为我确实没干过。那么——你今天的日课做完了吗？',options:[{label:'日课？不给羽毛我做它干啥',value:1},{label:'挑了几个简单的做',value:2},{label:'必须做完！还得满勤，我就是来逆水寒上班的',value:3}]},
{id:'q4',dim:'J2',text:'服务器临时维护4小时。你的精神状态更接近：',options:[{label:'太好了，终于有正当理由不上线了',value:1},{label:'刷刷社区看看大家在讨论啥，顺便摸个鱼',value:2},{label:'逆瘾发作，速速开门！',value:3}]},
{id:'q5',dim:'J3',text:'组队打副本灭团了。语音里沉默了三秒后，你开口的第一句话是：',options:[{label:'我是高手，不开麦',value:1},{label:'"刚刚谁没走机制出来认领一下好吗好的"',value:2},{label:'"反正我操作拉满了，不关我的事"',value:3}]},
{id:'q6',dim:'J3',text:'逆水寒玩家打本扣分行为自查，看看你中了几条：1.不管什么场景，统统一键连招 2.走位撞墙卡视角 3.大招交给空气 4.吃掉8次化羽 5.不走机制 6.秒拉秒死',options:[{label:'师傅别念了，都是我！',value:1},{label:'中了两三条，正常失误，谁还没个翻车的时候',value:2},{label:'这是我队友的症状清单。我负责截图发群嘲笑他们',value:3}]},
{id:'q7',dim:'S1',text:'世界频道有人发喇叭："滴个情缘，要求衣柜大、声音好听、每天陪玩4小时以上。"你的反应：',options:[{label:'自动忽略',value:1},{label:'不知道，没看清，反正+1+1+1+1+1+1',value:2},{label:'点进资料并打招呼私聊',value:3}]},
{id:'q8',dim:'S1',text:'每次路过汴京虹桥，你最真实的常态是：',options:[{label:'"好多人啊.jpg"，赶紧溜走',value:1},{label:'镜头拉到最近欣赏自己新染的头发',value:2},{label:'找个最完美的位置展示穿搭，顺便看隔壁模特们齐舞',value:3}]},
{id:'q9',dim:'S2',text:'帮会最近连续两周联赛连跪，统战在群里叹气。',options:[{label:'光速退帮跳槽',value:1},{label:'不走！说什么都不走！但也不打帮战嘻嘻',value:2},{label:'发攻略帮助大家提战，还会去世界频道招人',value:3}]},
{id:'q10',dim:'S2',text:'突然某一天，你意识到自己在帮会里投入了太多太多。每天组织帮战、调解矛盾、带新人、凑帮会资金，大当家跑了你接盘，二当家摸鱼你兜底。你不是在玩游戏，你是在当义务居委会主任。但有时候你也会想——我图什么呢？其实大家长期在帮会这种高压环境下情绪有点问题很正常哒～一定要学会自我调节，要相信一切都会啊啊啊啊啊啊啊啊啊！哈哈哈哈！好起来的哒～加油！',options:[{label:'所以我早就不这样了。人间清醒，该走就走',value:1},{label:'……这是在干什么？',value:2},{label:'这就是我啊。帮会就是我的家',value:3}]},
{id:'q11',dim:'S3',text:'萌新好友私聊你："大佬能借我288买衣服吗，下周还你。"你心里清楚——上周那个借288的人已经退游了。',options:[{label:'"你看我像不像288"',value:1},{label:'我直接送你，但是要到6月周年庆才会到账，到时候记得上号领',value:2},{label:'288而已，直接转了',value:3}]},
{id:'q12',dim:'S3',text:'别人说你"人真好"，你内心更接近哪句？',options:[{label:'我只是在做对我有利的事而已',value:1},{label:'也许吧',value:2},{label:'被需要的感觉确实让我开心',value:3}]},
{id:'q13',dim:'A1',text:'官方送了一套免费时装，还发了几个玉华染。你的常规操作：',options:[{label:'随便染个纯黑或纯白，假装自己是个冷酷杀手。五秒搞定OOTD',value:1},{label:'在装扮站试了几个颜色，挑了个顺眼的，十分钟内搞定',value:2},{label:'在染色界面拉RGB拉了三个小时，试图调出绝美独属于自己的颜色，最后发现还不如在装扮站一键应用',value:3}]},
{id:'q14',dim:'A1',text:'你在汴京看到一个全身搭配精致的玩家，走过去的时候你甚至觉得ta自带BGM（你的幻觉）。你：',options:[{label:'不知道，我的穿搭更曼妙~',value:3},{label:'多看了两眼，确实挺好看，内心默默夸奖然后离开',value:2},{label:'当场私聊追问全套搭配方案，回去穿上同款总觉得还差点意思',value:1}]},
{id:'q15',dim:'A2',text:'个人认为庄园里不应该随便放家具的。根据传统美学，乱摆的家具会给光临者不好的视觉体验，从而使人心烦意乱。心理学专家曾经说过：不好的视觉体验会传达不好的价值观。再根据勾股定理来说，毛坯房不应该出现在逆水寒里——所以人不吃混凝土拌意大利面的时候，应该去庄园整点装修。那么你的庄园：',options:[{label:'庄园？我常常三过家门而不入',value:1},{label:'一键套用简单的模板，能坐能躺就行',value:2},{label:'不好意思，我的千万豪宅很高级，但你可以和我一起还房贷吗？OvO',value:3}]},
{id:'q16',dim:'A2',text:'朋友拉你参观他精心装修了一个月的庄园。你走进去转了一圈：',options:[{label:'"挺好的"——但...你对我的手机做了什么，好卡！',value:1},{label:'"这个角落可以放个石灯笼，那边的树换成桃花更搭"——你居然有审美意见',value:2},{label:'你已经问到了同款模板准备回去一比一复刻了。但更生气的是——他用了一个你买不起的限定摆件',value:3}]},
{id:'q17',dim:'A3',text:'你在某个地图赶路，突然光线变化，远处山峦云雾缭绕美如画卷——',options:[{label:'无视，继续赶路。',value:1},{label:'顺手按了一下拍照键，然后继续走',value:2},{label:'立刻停下，开启拍照，调好角度，选好滤镜，精心卡动作，拍40张选3张修图发在社区',value:3}]},

"BOSS":{code:"BOSS",cn:"天选大当家",emoji:"👑",confirm:"大宋义务居委会主任",desc:"恭喜确诊：帮会义务管理综合症，晚期。\n症状如下：帮会群一有红点你就紧张，帮战少一个人你比当家还急，你不是当家但干的活比当家多，你没有工资但比996还准时上线。\n你在现实里可能连外卖都懒得催，在游戏里却能以惊人的耐心调解两个互不认识的人之间的关系，帮主跑路你接盘，二当家摸鱼你兜底，帮里谁吵架你当和事佬，谁要退游你去挽留。你每天都在后悔为什么要当这个大冤种，发誓明天起绝对只做混子——\n然而到了第二天："今晚打团缺个奶妈？算了我切号顶上吧。"",advice:"把"不管了""爱咋咋地"打在公屏上，放下助人情结，尊重他人命运。"},
"DATU":{code:"DATU",cn:"大腿",emoji:"💪",confirm:"全服共享单车",desc:"上线即刻遭遇私聊轰炸："大佬救急""打本吗""今天带我吗"……你的好友列表哪是用来社交的，全是别人单方面给你记下的"带本债务清单"。\n永远的秒伤断层第一，永远的机制救火队长。带飞全场已经成了你的肌肉记忆，偶尔如果在野队遇到个秒伤比你还高的大神，你心里竟然会涌起一阵久违的狂喜——"今天终于能当混子了！"嘴上骂骂咧咧"别拉我，最后一次了啊"，手却已经条件反射点下了进组确认。你玩的哪是逆水寒，你是在大宋做7x24小时全职免费代练。",advice:"建议设置"今日已下线"自动回复。把状态切成"隐身"，是你给肝留下的最后一点体面。"},
"AFK!":{code:"AFK!",cn:"挂机侠",emoji:"💤",confirm:"赛博植物人",desc:"恭喜确诊：赛博植物人综合症。此结果不是算出来的，是你亲口承认的。\n你的日常：早上开机登录挂机出门，中午瞄一眼背包多了点东西，晚上继续挂着自己去刷手机。你的角色是服务器最勤劳的NPC，24小时站岗风雨无阻。",advice:"只要你不操作，游戏里的风吹草动都影响不到你。建议在角色头上放个花盆，完成从植物人到真·植物的进化。"},
"KRYP":{code:"KRYP",cn:"买买买战士",emoji:"💰",confirm:"大宋第一消费体验官",desc:"恭喜确诊：下单手速比释放大招还快，且从不后悔。\n你对逆水寒有一套自己的哲学：虽然常穿的永远是那两套，但拥有和使用是两回事——衣柜满了才有安全感，这跟战力无关，跟心情有关。\n商城上新对你来说像逛超市：进去之前说"今天只看看"，出来的时候购物车已经清空了。但你不纠结，因为每一个买的时候都是真心喜欢的。\n你不是在玩逆水寒，你是逆水寒的年度VIP体验官——体验一切、拥有一切、然后告诉别人"这个值不值得买"。",advice:"下次商城上新之前先把购物车里的东西截个图，等三天再看——如果三天后还想买，那就是真爱。不过以你的性格，这条建议的保质期大概只有三秒。"},
"SOLO":{code:"SOLO",cn:"独狼",emoji:"🐺",confirm:"大宋社恐晚期患者",desc:"恭喜确诊：选择性社交回避症。注意是"选择性"——你不是不会社交，是嫌累。\n好友列表个位数，帮会只是领福利的地方，帮会活动从来不参加。你擅长单人速刷副本，队友对你来说是一种debuff——让你需要考虑配合，打断你的节奏。\n做人好难，但如果可以你想做一棵逆水寒里的树——独自站着，不用社交，风景还好，谁砍你你也不用回话。",advice:"你的好友列表比大熊猫还珍稀。但玩游戏，自己开心最重要！"},
"NOOB":{code:"NOOB",cn:"永恒萌新",emoji:"🐣",confirm:"永久性认知停滞综合症患者",desc:"恭喜确诊：永久性游戏认知停滞症，无治愈可能。\n你可能玩了很久，但永远保持萌新的心态——不是装的，是真的不会。战力永远比平均水平低一截，技能连招永远有点奇怪，时不时在帮会群里问出让所有人沉默三秒的问题——"装备怎么强化""传送到底怎么用"。\n别人研究配装公式的时候你在研究NPC旁边的花是什么品种。帮战你永远分不清敌我，经常打着打着发现砍的是自己人。你的每一次操作都像是第一次登录这个游戏。\n但奇怪的是大家都喜欢你。因为你是帮会里唯一一个真的在"玩"游戏而不是在"肝"游戏的人。你不是在玩逆水寒，你是在逆水寒里观光旅游。",advice:"不要试图变强，那会毁掉你的生态位——大家需要一个永远让人安心的萌新来证明"至少我不是最菜的"。"},
"RAGE":{code:"RAGE",cn:"暴躁老哥",emoji:"🔥",confirm:"人体血压监测仪",desc:"恭喜确诊：游戏性高血压，建议立刻停止一切活动（你不会的）。\n为什么！为什么！为什么这个游戏处处跟你作对！同门的冷漠就像北极的冰川！把你这颗滚烫的心浇得嗤嗤冒烟！你的愤怒从不隔夜，因为你根本不给它隔夜的机会——实时引爆，当场炸裂。你的情绪波动比服务器还不稳定，室友以为你每天在跟人打电话吵架。\n但你不是真的恶毒，只是太在乎了。骂完五分钟后还是乖乖上线做日常，一边做一边骂。",advice:"少看世界频道，多去三清山听听鸟叫。"},
"DRIP":{code:"DRIP",cn:"时装怪",emoji:"👘",confirm:"汴京时装周首席策展人",desc:"恭喜确诊：虚拟衣柜囤积症，伴有严重的审美强迫。\n对你来说逆水寒不是武侠游戏是换装游戏。战力排行？不关心。副本进度？无所谓。但穿一套丑衣服出门？不如杀了你。角色衣柜比现实衣柜丰富十倍，每一套限定时装你都有，上线第一件事不是做日常而是换衣服。\n你在染色界面花的时间比副本里还长。你知道RGB什么数值能调出莫兰迪色系，知道哪两件时装混搭有惊喜效果。汴京走过身后总有人驻足查看——不是因为你强，是因为你好看。\n你最近一次因为游戏激动不是打Boss掉装备，而是获得了一件特别喜欢的新外观！",advice:"没有建议，你怎么这么好看！"},
"SIMP":{code:"SIMP",cn:"热心侠",emoji:"🤝",confirm:"大宋编外雷锋",desc:"恭喜确诊：主动型社交热情过剩，且完全停不下来。\n你是帮会里最温暖的存在，虽然你自己可能没意识到。谁缺人你第一个报名，谁喊帮忙你秒回"来了"，哪怕你手头自己的事还没做完。缺奶你切奶，缺T你换T——不是没有自己的事要做，是看到别人开口了就忍不住想帮。\n你的铜币流向确实有点随缘——今天打本顺手拍了下内功，明天帮那个送了套时装。你不记账，也不指望别人还。你享受的是"被需要"那一刻的踏实感，和一起打本时热热闹闹的氛围。\n有人说你"太好说话了"，有人劝你"别什么都答应"。你听了，觉得有道理，然后下一秒又接了一个求助私聊。你的热情不是因为没有判断力，是因为你觉得——游戏嘛，大家开心最重要，举手之劳的事何必计较那么多。\n你不是在玩逆水寒，你是帮会里那个让所有人觉得"还好有你在"的人。",advice:"你的热心是真的稀缺资源，但偶尔也记得先照顾好自己，才能继续当大家的靠山。"},
"FISH":{code:"FISH",cn:"咸鱼",emoji:"🐟",confirm:"赛博咸鱼综合症",desc:"恭喜确诊：赛博咸鱼综合症，晚期，已无治疗必要。\n你对逆水寒的一切都无所谓到了一种禅宗的境界。战力？不关心。日常？想起来就做。帮战？你有帮吗？换个地图，世界很大。你的游戏日常：上线→站在汴京桥头发呆→看看世界频道乐一乐→发现没什么想做的→下线。做人好难，如果可以你想做一根薯条。薯条很合群，一根薯条丢进一堆薯条里就找不到了。\n但你才是真正看透一切的人。当别人为排名焦虑、为帮战吵架时，你在钓鱼。字面意义上的钓鱼。人不吃混凝土拌意大利面的时候，应该去码头整点薯条。",advice:"继续保持，你必将修炼成仙~"},
"PLOT":{code:"PLOT",cn:"剧情痴",emoji:"📖",confirm:"虚拟江湖深度共情综合症",desc:"恭喜确诊：虚拟叙事成瘾症，沉浸度超标。\n你玩游戏从不带"跳过"键，别人在疯狂跳剧情赶进度，你在逐帧截图品味CG。\n别人眼里的江湖是打怪升级，你眼里的江湖是一张盘根错节的人物关系网。你不仅对主线倒背如流，连路边一把破剑的道具描述、奇遇里的几句闲聊，你都能敏锐地扒出第三章和第七章之间埋下的伏笔。你发在论坛的剧情解析长贴，总能引来无数惊呼："卧槽，原来这里还有个隐藏彩蛋？！"\n你极度重感情，为某个人物的意难平写过几千字的小传；某段剧情结束后，你会特意跑回那个NPC曾经站过的地方默默待上十分钟，在心里给他敬一杯酒。路过的玩家以为你在挂机，只有你自己知道，你在和一位老朋友告别。",advice:"保护好你这份柔软的共情力。江湖不只有打打杀杀，正是因为有你，大宋的恩怨情仇才有了真正的温度。"},
"HOME":{code:"HOME",cn:"装修鬼",emoji:"🏡",confirm:"大宋建设局编外规划师",desc:"恭喜确诊：虚拟空间设计强迫症。\n对你来说，《逆水寒》根本不是什么武侠MMO，而是一款附带了打怪玩法的"3D硬核建筑软件"。\n你对PVP唯唯诺诺，在庄园里重拳出击。每天种菜收菜只为肝那点"资材"，新出的衣服可以不买，但上新的家具盲盒和积木组件必须拿下。别人用积木搭房子，你用积木在岛上建紫禁城、苏州园林和赛博朋克夜之城。如果有人来参观你的庄园，手机没有卡到掉帧，你会觉得是自己的组件堆叠得还不够宏大。\n什么？有人敢说你搭的景"一般般"？——当场送客！大宋鲁班的心血也是你这等凡人能评价的？",advice:"你的审美和设计能力如果能变现，你早就是著名建筑师了。只可惜你所有的才华，都用来疯狂榨干前来参观你庄园的好友的手机处理器。"},
"JUMP":{code:"JUMP",cn:"跳帮王",emoji:"🦘",confirm:"大宋灵活就业人员",desc:"恭喜确诊：帮会归属感缺失综合症。\n进帮三天，就是你的极限考察期。第一天看联赛打什么段位，第二天看群里活人多不多，第三天评估当家的办事能力。只要有一项不达标——联赛掉段了？溜！帮主爱画大饼？溜！直接光速退帮，留下一个潇洒的背影。\n你堪称大宋最顶级的"帮会HR"，不管到哪个新群都能在十分钟内和大家混熟，甚至还能混个眼熟再走。你不是在玩逆水寒，你是在大宋进行无止境的"寻找乌托邦帮会"田野调查。",advice:"建议把各大帮会统战都加好友，方便你随时"择木而栖"。"},
"FARM":{code:"FARM",cn:"肝帝",emoji:"⚙️",confirm:"大宋赛博劳模",desc:"官方主打"殊途同归"劝你别太累，你主打一个"条条大路我都要走绝"。\n你有着比打卡上班还要严苛的生物钟。每天一睁眼，不是问今天星期几，而是条件反射：青崖书做完了吗？活力清空了吗？游历收菜了吗？\n别人慢悠悠做周常，你周一晚上就已经把"风云令"上限刷爆了。对你来说，最爽的不是副本爆了绝世独珍，而是看着所有红点被消灭、段位进度条全满的那一瞬间带来的多巴胺狂飙。看着朋友号上快溢出的活力值，你比当事人还要抓心挠肝："你这活力怎么满了？快去挖矿/采摘啊！这简直是暴殄天物！"",advice:"建议把日常清单打印出来贴工位上，这样上班和玩游戏的体验就完全一致了，无缝切换，毫无违和。"},
"SNAP":{code:"SNAP",cn:"摄影师",emoji:"📸",confirm:"大宋时空定格大师",desc:"恭喜确诊：虚拟摄影上瘾症。\n别人的江湖是刀光剑影、秒伤内卷，你的江湖是风花雪月、光影交错。\n你有一双能发现大宋极致浪漫的眼睛。当所有人在新地图疯狂寻人打怪找宝箱时，你总是默默开启"极简UI"，屏蔽掉所有玩家，将镜头对准一束穿过竹林的阳光，或是一片随风飘落的桃花。\n你记录了帮会结义时的烟花，记录了情缘初见时的晚霞，也记录了自己捏了三个小时才满意的完美侧颜。别人打出的极品装备会随版本迭代被淘汰，但你相册里定格的每一个瞬间，都是这个虚拟江湖里最保值的浪漫。",advice:"请继续保持你对美的偏执。正是因为有你"大宋野生摄影师"的存在，大家才惊觉原来天天路过的汴京桥头，竟然有这么美的风景。"},

const app={answers:{}};
const screens={intro:document.getElementById('intro'),test:document.getElementById('test'),result:document.getElementById('result')};
const questionList=document.getElementById('questionList');
const progressBar=document.getElementById('progressBar');
const progressText=document.getElementById('progressText');
const submitBtn=document.getElementById('submitBtn');
const testHint=document.getElementById('testHint');

function showScreen(name){Object.entries(screens).forEach(([k,el])=>{el.classList.toggle('active',k===name)});window.scrollTo({top:0,behavior:'smooth'})}

function renderQuestions(){
  questionList.innerHTML='';
  questions.forEach((q,idx)=>{
    const card=document.createElement('article');
    card.className='question';
    card.innerHTML=`
      <div class="question-meta"><div class="badge">第 ${idx+1} 题</div><div>${dimMeta[q.dim]?.model||''}</div></div>
      <div class="question-title">${q.text}</div>
      <div class="options">${q.options.map((opt,i)=>{
        const code=['A','B','C'][i];
        const checked=app.answers[q.id]===opt.value?'checked':'';
        const sel=app.answers[q.id]===opt.value?' selected':'';
        return `<label class="option${sel}"><input type="radio" name="${q.id}" value="${opt.value}" ${checked}/><div class="option-check"></div><div class="option-code">${code}</div><div>${opt.label}</div></label>`;
      }).join('')}</div>`;
    questionList.appendChild(card);
  });
  // Long text collapse: if question text > 80 chars, add .long class
  questionList.querySelectorAll('.question-title').forEach(el=>{
    if(el.textContent.length>80){
      el.classList.add('long');
      el.addEventListener('click',()=>el.classList.toggle('expanded'));
    }
  });
  questionList.querySelectorAll('input[type="radio"]').forEach(input=>{
    input.addEventListener('change',e=>{
      app.answers[e.target.name]=Number(e.target.value);
      const opts=e.target.closest('.options');
      opts.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
      e.target.closest('.option').classList.add('selected');
      updateProgress();
    });
  });
  updateProgress();
}

function updateProgress(){
  const total=questions.length;
  const done=questions.filter(q=>app.answers[q.id]!==undefined).length;
  progressBar.style.width=`${(done/total)*100}%`;
  progressText.textContent=`${done} / ${total}`;
  const complete=done===total;
  submitBtn.disabled=!complete;
  testHint.textContent=complete?'都答完了，来看看你是什么类型的逆水寒玩家吧。':'答完所有题才能提交。少侠，认真点。';
}

function computeResult(){
  // Check Q29 AFK trigger: Q29 option C has value=1 (reversed scoring)
  if(app.answers['q29']===1){
    return{type:TYPE_LIB['AFK!'],isAfk:true,scores:{},matchPct:100};
  }
  // Compute dimension averages
  const scores={};
  dimOrder.forEach(dim=>{
    const qids=dimQuestions[dim];
    const vals=qids.map(id=>app.answers[id]||0);
    scores[dim]=+(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  });
  // Euclidean distance matching
  const userVec=dimOrder.map(d=>scores[d]);
  let best=null,bestDist=Infinity;
  PATTERNS.forEach(p=>{
    if(p.code==='AFK!')return; // skip AFK in normal matching
    let dist=0;
    for(let i=0;i<15;i++)dist+=(userVec[i]-p.v[i])**2;
    dist=Math.sqrt(dist);
    if(dist<bestDist){bestDist=dist;best=p}
  });
  const maxDist=Math.sqrt(15*4); // max possible distance (all dimensions differ by 2)
  const matchPct=Math.max(0,Math.round((1-bestDist/maxDist)*100));
  return{type:TYPE_LIB[best.code],isAfk:false,scores,matchPct};
}

function renderResult(){
  const r=computeResult();
  const t=r.type;
  document.getElementById('resultEmoji').textContent=t.emoji;
  document.getElementById('resultKicker').textContent=r.isAfk?'隐藏人格已激活':'你的江湖人格';
  document.getElementById('resultTypeName').textContent=`${t.code}（${t.cn}）`;
  document.getElementById('resultConfirm').textContent=`确诊：${t.confirm}`;
  document.getElementById('matchBadge').textContent=r.isAfk?'匹配度 100% · 你亲口承认的':`匹配度 ${r.matchPct}%`;
  document.getElementById('resultDesc').textContent=t.desc;
  document.getElementById('adviceTitle').textContent='🏥 大宋生存建议';
  document.getElementById('adviceText').textContent=t.advice;

  const dimList=document.getElementById('dimList');
  if(r.isAfk){
    dimList.innerHTML='<div class="dim-item"><div class="dim-item-top"><div class="dim-item-name">维度评分不适用</div></div><p style="color:var(--muted);font-size:13px">此结果由Q29强制触发，未经过维度计算。</p></div>';
  }else{
    dimList.innerHTML=dimOrder.map(dim=>`
      <div class="dim-item">
        <div class="dim-item-top">
          <div class="dim-item-name">${dimMeta[dim].name}</div>
          <div class="dim-item-score">${r.scores[dim]}</div>
        </div>
      </div>`).join('');
  }
  showScreen('result');
}

function startTest(){app.answers={};renderQuestions();showScreen('test')}

document.getElementById('startBtn').addEventListener('click',()=>startTest());
document.getElementById('backIntroBtn').addEventListener('click',()=>showScreen('intro'));
document.getElementById('submitBtn').addEventListener('click',renderResult);
document.getElementById('restartBtn').addEventListener('click',()=>startTest());
document.getElementById('toTopBtn').addEventListener('click',()=>showScreen('intro'));
</script>
